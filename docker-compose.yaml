version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: brightup_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: brightup
    ports:
      - "3306:3306"
    volumes:
      - ./database/brightup_schema.sql:/docker-entrypoint-initdb.d/brightup_schema.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: